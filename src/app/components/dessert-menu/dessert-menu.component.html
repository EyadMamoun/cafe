<div class="container py-5">
    <div class="row align-items-center bg-white py-4 border rounded">
        <span class="header-style">DESSERT MENU</span>

        <!-- Dessert Menu -->
        <div class="menu-container">
            @for (item of dessert; track $index) {
            <app-menu-option class="item-positioning" [menuItems]="item" [selectedProduct]="item" />
            }
        </div>
    </div>
</div>

@if(subtotal != 0 && showSubtotal){
<app-subtotal (close)="closeSubtotal()" />
}
